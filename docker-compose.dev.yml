version: "3.8"
services:
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
  auth-service:
    build: ./services/auth-service
    env_file: .env.example
    ports:
      - "4001:4001"
    depends_on:
      - mongo
      - redis
  gateway:
    build: ./services/gateway
    env_file: .env.example
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - chat-service
  chat-service:
    build: ./services/chat-service
    env_file: .env.example
    ports:
      - "5001:5001"
    depends_on:
      - redis
  client:
    build: ./web/client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
  embeddings-service:
    build: ./ai/embeddings-service
    env_file: .env.example
    ports:
      - "6001:6001"
volumes:
  mongo-data:

